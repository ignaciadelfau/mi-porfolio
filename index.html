<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ignacia · UX/UI Designer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1400FF;
      --yellow: #FFD600;
      --black: #0D0D0D;
      --white: #FAFAFA;
    }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      text-decoration: none;
      color: var(--black);
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--black);
      flex-shrink: 0;
    }

    .logo-d {
      border: 3px solid var(--black);
      border-radius: 0 6px 6px 0;
      width: 28px;
      height: 22px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 36px;
    }

    nav ul a {
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      position: relative;
      padding-bottom: 2px;
    }

    nav ul a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 2px;
      background: var(--blue);
      transition: width 0.3s ease;
    }

    nav ul a:hover::after { width: 100%; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
    }

    /* Soft glowing blob */
    .blob {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        rgba(255, 214, 0, 0.85) 0%,
        rgba(255, 230, 100, 0.5) 35%,
        rgba(255, 245, 180, 0.15) 65%,
        transparent 75%
      );
      filter: blur(18px);
      animation: pulse 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.06); opacity: 0.85; }
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hello {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(5rem, 15vw, 10rem);
      line-height: 0.95;
      color: var(--blue);
      letter-spacing: -0.03em;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .subtitle {
      margin-top: 20px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.5;
      color: var(--black);
      animation: slideUp 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCROLL ARROW ── */
    .scroll-hint {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      animation: bounce 2.2s ease-in-out infinite;
      cursor: pointer;
      z-index: 10;
    }

    .scroll-hint svg {
      width: 36px;
      height: 36px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(8px); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 20px 24px; }
      nav ul { gap: 20px; }
      .blob { width: 320px; height: 320px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="logo" href="#">
      <span class="logo-dot"></span>
      <span class="logo-d"></span>
    </a>
    <ul>
      <li><a href="#projects">Proyects</a></li>
      <li><a href="#about">About</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="blob"></div>
    <div class="hero-content">
      <h1 class="hello">Hello.</h1>
      <p class="subtitle">
        I'm Ignacia,<br>
        UX/UI Designer
      </p>
    </div>

    <!-- Scroll chevron -->
    <div class="scroll-hint" onclick="window.scrollBy({top: window.innerHeight, behavior:'smooth'})">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="17" stroke="#0D0D0D" stroke-width="1.5"/>
        <polyline points="12,15 18,22 24,15" stroke="#0D0D0D" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </section>

</body>
</html>
